<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>{{ page.title }}</title>
<meta name="description" content="{{ page.description }}"/>
<link rel="canonical" href="{{ page.url | absolute_url }}"/>

<meta property="og:type" content="website"/>
<meta property="og:site_name" content="Radiant Joint Alliance"/>
<meta property="og:title" content="{{ page.title }}"/>
<meta property="og:description" content="{{ page.description }}"/>
<meta property="og:url" content="{{ page.url | absolute_url }}"/>
<meta property="og:image" content="{{ '/og-image.png' | absolute_url }}"/>
<meta property="og:image:width" content="1200"/>
<meta property="og:image:height" content="630"/>

<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="{{ page.title }}"/>
<meta name="twitter:description" content="{{ page.description }}"/>
<meta name="twitter:image" content="{{ '/og-image.png' | absolute_url }}"/>

{% include head-assets.html %}
{% include style.html %}
{% if page.schema %}<script type="application/ld+json">{{ page.schema }}</script>{% endif %}
</head>
<body>

{% include nav.html %}

{{ content }}

{% include footer.html %}
{% include scripts.html %}
</body>
</html>
