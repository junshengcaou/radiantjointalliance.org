<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 :root {
 --teal: #1a6b7a;
 --dark-teal: #0e4a57;
 --deep: #082f3a;
 --lt-teal: #e8f5f8;
 --mid-teal: #c2dde4;
 --amber: #c8960c;
 --amber-bg: #fff8e6;
 --white: #ffffff;
 --off-white: #f8fcfd;
 --gray-1: #1a2e3b;
 --gray-2: #3d5a66;
 --gray-3: #6a8a96;
 --gray-4: #b0ccd4;
 --radius: 10px;
 --shadow: 0 2px 18px rgba(14,74,87,0.10);
 }
 html { scroll-behavior: smooth; }
 body { font-family: 'Inter', sans-serif; color: var(--gray-1); background: var(--white); font-size: 16px; line-height: 1.6; }

 /* ── NAV ── */
 nav {
 position: sticky; top: 0; z-index: 100;
 background: var(--deep);
 display: flex; align-items: center; justify-content: space-between;
 padding: 0 40px; height: 62px;
 box-shadow: 0 2px 12px rgba(0,0,0,0.18);
 }
 .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
 .nav-logo img { width: 34px; height: auto; display: block; }
 .nav-logo span { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--white); letter-spacing: 0.3px; }
 .nav-links { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
 .nav-links a {
 color: rgba(255,255,255,0.78); font-size: 13px; font-weight: 500;
 padding: 6px 10px; border-radius: 6px; text-decoration: none;
 transition: background 0.18s, color 0.18s;
 display: inline-flex; align-items: center; gap: 4px;
 }
 .nav-links a:hover { background: rgba(255,255,255,0.1); color: var(--white); }
 .nav-links a.active { color: var(--white); font-weight: 600; }
 .nav-links a.nav-cta {
 margin-left: 4px;
 }
 .nav-links a.nav-cta:hover { background: rgba(255,255,255,0.1); }

 /* ── NAV DROPDOWN ── */
 .nav-dropdown { position: relative; display: inline-flex; }
 .nav-dropdown-toggle .caret { font-size: 10px; transition: transform 0.18s; }
 .nav-dropdown.open .nav-dropdown-toggle .caret { transform: rotate(180deg); }
 .nav-dropdown-menu {
 display: none; position: absolute; top: calc(100% + 8px); left: 0;
 background: var(--white); border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
 min-width: 190px; padding: 6px; z-index: 200;
 }
 .nav-dropdown.open .nav-dropdown-menu { display: block; }
 .nav-dropdown-menu a {
 display: block; color: var(--gray-1); font-size: 13.5px; font-weight: 500;
 padding: 9px 12px; border-radius: 7px; text-decoration: none;
 transition: background 0.15s;
 }
 .nav-dropdown-menu a:hover { background: var(--lt-teal); }
 .nav-dropdown-menu a.active { color: var(--dark-teal); font-weight: 700; background: var(--lt-teal); }

 /* ── PAGES ── */
 .page { display: none; }
 .page.active { display: block; }

 /* ── HERO ── */
 .hero {
 background: linear-gradient(135deg, var(--deep) 0%, var(--dark-teal) 55%, #1a6b7a 100%);
 padding: 90px 40px 80px;
 text-align: center;
 position: relative; overflow: hidden;
 }
 .hero::before {
 content: '';
 position: absolute; top: -80px; right: -80px;
 width: 340px; height: 340px; border-radius: 50%;
 background: rgba(255,255,255,0.04);
 }
 .hero::after {
 content: '';
 position: absolute; bottom: -100px; left: -60px;
 width: 280px; height: 280px; border-radius: 50%;
 background: rgba(255,255,255,0.03);
 }
 .hero-sun { margin: 0 auto 24px; width: 84px; height: auto; display: block; }
 .hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--mid-teal); margin-bottom: 16px; }
 .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 46px); color: var(--white); line-height: 1.2; margin-bottom: 20px; max-width: 720px; margin-left: auto; margin-right: auto; }
 .hero p { font-size: 17px; color: rgba(255,255,255,0.78); max-width: 560px; margin: 0 auto 36px; line-height: 1.7; }
 .btn { display: inline-block; padding: 13px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; }
 .btn-primary { background: var(--amber); color: var(--white); }
 .btn-primary:hover { background: #b5840a; transform: translateY(-1px); }
 .btn-outline { background: transparent; color: var(--white); border: 2px solid rgba(255,255,255,0.4); margin-left: 12px; }
 .btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.08); }

 /* ── STAT STRIP ── */
 .stat-strip { background: var(--lt-teal); border-bottom: 1px solid var(--mid-teal); }
 .stat-strip-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); padding: 28px 40px; gap: 20px; }
 .stat { text-align: center; }
 .stat-num { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--dark-teal); font-weight: 700; }
 .stat-label { font-size: 13px; color: var(--gray-2); margin-top: 4px; }

 /* ── SECTION ── */
 .section { padding: 64px 40px; max-width: 960px; margin: 0 auto; }
 .section-sm { padding: 48px 40px; max-width: 960px; margin: 0 auto; }
 .section-title { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--dark-teal); margin-bottom: 10px; }
 .section-sub { font-size: 15px; color: var(--gray-2); margin-bottom: 36px; max-width: 580px; }
 .divider-line { width: 48px; height: 3px; background: var(--teal); border-radius: 2px; margin-bottom: 24px; }

 /* ── CARDS ── */
 .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
 .card { background: var(--white); border: 1px solid var(--mid-teal); border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow); }
 .card-icon { width: 44px; height: 44px; background: var(--lt-teal); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; }
 .card h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--dark-teal); margin-bottom: 10px; }
 .card p { font-size: 14px; color: var(--gray-2); line-height: 1.65; }

 /* ── CHECKLIST ── */
 .checklist { list-style: none; display: flex; flex-direction: column; gap: 12px; }
 .checklist li { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; color: var(--gray-1); }
 .check-icon { width: 22px; height: 22px; background: var(--teal); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
 .check-icon svg { width: 12px; height: 12px; }

 /* ── QUESTIONS BOX ── */
 .q-box { background: var(--dark-teal); border-radius: var(--radius); padding: 32px 36px; }
 .q-box h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--white); margin-bottom: 22px; }
 .q-item { display: flex; gap: 16px; margin-bottom: 18px; align-items: flex-start; }
 .q-num { background: var(--teal); color: var(--white); width: 28px; height: 28px; border-radius: 50%; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
 .q-text { font-size: 15px; color: rgba(255,255,255,0.88); font-style: italic; line-height: 1.55; padding-top: 3px; }

 /* ── AMBER BOX ── */
 .amber-box { background: var(--lt-teal); border: none; border-left: 4px solid var(--dark-teal); border-radius: var(--radius); padding: 22px 26px; display: flex; gap: 14px; align-items: flex-start; }
 .amber-icon { font-size: 20px; color: var(--dark-teal); flex-shrink: 0; margin-top: 2px; }
 .amber-box p { font-size: 14px; color: var(--gray-1); line-height: 1.65; }

 /* ── FAQ ACCORDION ── */
 .faq-item { background: var(--white); border: 1px solid var(--mid-teal); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
 .faq-item summary { list-style: none; cursor: pointer; padding: 18px 24px; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 600; color: var(--dark-teal); display: flex; justify-content: space-between; align-items: center; gap: 16px; }
 .faq-item summary::-webkit-details-marker { display: none; }
 .faq-item summary::after { content: '+'; font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 400; color: var(--teal); flex-shrink: 0; transition: transform 0.2s; }
 .faq-item[open] summary::after { transform: rotate(45deg); }
 .faq-item[open] summary { border-bottom: 1px solid var(--mid-teal); }
 .faq-body { padding: 4px 24px 22px; font-size: 14.5px; color: var(--gray-2); line-height: 1.75; }
 .faq-body p { margin-bottom: 12px; }
 .faq-body p:last-child { margin-bottom: 0; }
 .faq-category { font-family: 'Playfair Display', serif; color: var(--teal); letter-spacing: 0.4px; text-transform: uppercase; font-size: 16px; font-weight: 700; margin: 32px 0 14px; }
 .faq-category:first-child { margin-top: 0; }

 /* ── SIGNUP / NEW-THIS-MONTH ── */
 .signup-box { background: linear-gradient(135deg, var(--dark-teal) 0%, var(--deep) 100%); border-radius: var(--radius); padding: 36px 40px; text-align: center; }
 .signup-box h3 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--white); margin-bottom: 10px; }
 .signup-box p { font-size: 14.5px; color: rgba(255,255,255,0.8); max-width: 480px; margin: 0 auto 22px; line-height: 1.6; }
 .signup-form { display: flex; gap: 10px; max-width: 440px; margin: 0 auto; flex-wrap: wrap; justify-content: center; }
 .signup-form input[type=email] { flex: 1; min-width: 200px; padding: 12px 16px; border-radius: 8px; border: none; font-size: 14px; font-family: 'Inter', sans-serif; }
 .signup-form button { flex-shrink: 0; }
 .signup-box .signup-note { font-size: 12px; color: rgba(255,255,255,0.55); margin: 18px auto 0; text-align: center; }
 .signup-success { display: none; color: var(--white); font-size: 14px; margin-top: 16px; }

 .new-strip { background: var(--amber-bg); border: 1px solid #e8c84a; border-radius: var(--radius); padding: 20px 26px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
 .new-badge { background: var(--amber); color: var(--white); font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 20px; flex-shrink: 0; }
 .new-strip p { font-size: 14px; color: #5a4400; margin: 0; }
 .new-strip a { color: var(--dark-teal); font-weight: 600; text-decoration: none; }

 /* ── WHAT TO EXPECT TIMELINE ── */
 .expect-stage { display: flex; gap: 24px; margin-bottom: 8px; }
 .expect-marker { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 40px; }
 .expect-dot { width: 40px; height: 40px; border-radius: 50%; background: var(--dark-teal); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; flex-shrink: 0; }
 .expect-line { flex: 1; width: 2px; background: var(--mid-teal); margin: 6px 0; min-height: 30px; }
 .expect-stage:last-child .expect-line { display: none; }
 .expect-content { padding-bottom: 44px; flex: 1; }
 .expect-content h2 { font-family: 'Playfair Display', serif; font-size: 21px; color: var(--dark-teal); margin-bottom: 6px; }
 .expect-content .expect-sub { font-size: 13px; color: var(--gray-3); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
 .expect-content p { font-size: 14.5px; color: var(--gray-2); line-height: 1.75; margin-bottom: 12px; }
 .expect-content ul { margin: 0 0 12px 0; padding-left: 20px; }
 .expect-content li { font-size: 14.5px; color: var(--gray-2); line-height: 1.7; margin-bottom: 6px; }

 /* ── SHARE WIDGET ── */
 .share-box { border: 1px dashed var(--mid-teal); border-radius: var(--radius); padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; background: var(--off-white); }
 .share-box p { font-size: 14px; color: var(--gray-2); margin: 0; }

 /* ── PAGE FEEDBACK WIDGET ── */
 .feedback-box { border: 1px solid var(--mid-teal); border-radius: var(--radius); padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; background: var(--white); }
 .feedback-box p { font-size: 14px; color: var(--gray-2); margin: 0; }
 .feedback-actions { display: flex; gap: 8px; }
 .feedback-btn { background: var(--off-white); border: 1px solid var(--mid-teal); font-size: 18px; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1; }
 .feedback-btn:hover { background: var(--lt-teal); border-color: var(--teal); }
 .feedback-btn:disabled { opacity: 0.4; cursor: default; }
 .feedback-btn:disabled:hover { background: var(--off-white); border-color: var(--mid-teal); }
 .feedback-thanks { font-size: 14px; color: var(--dark-teal); font-weight: 600; display: none; }
 .share-actions { display: flex; gap: 8px; flex-shrink: 0; }
 .share-btn { background: var(--white); border: 1px solid var(--mid-teal); color: var(--dark-teal); font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 7px; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.15s; }
 .share-btn:hover { background: var(--lt-teal); }

 /* ── TWO COL ── */
 .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
 @media (max-width: 680px) { .two-col { grid-template-columns: 1fr; } }
 .advisor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
 @media (max-width: 680px) { .advisor-grid { grid-template-columns: 1fr; } }

 /* ── TREATMENT ANIMATION + DOSE COMPARISON ── */
 .visual-card {
 background: var(--white);
 border: 1px solid var(--mid-teal);
 border-radius: var(--radius);
 padding: 26px;
 box-shadow: var(--shadow);
 }
 .visual-card h3 {
 font-family: 'Playfair Display', serif;
 color: var(--dark-teal);
 font-size: 20px;
 margin-bottom: 8px;
 }
 .visual-card p {
 font-size: 14px;
 color: var(--gray-2);
 line-height: 1.65;
 }
 .linac-stage {
 position: relative;
 margin-top: 20px;
 background: linear-gradient(180deg, #f8fcfd 0%, #e8f5f8 100%);
 border: 1px solid var(--mid-teal);
 border-radius: 14px;
 min-height: 330px;
 overflow: hidden;
 }
 .linac-svg {
 width: 100%;
 height: 330px;
 display: block;
 }
 .gantry-arm {
 transform-origin: 245px 154px;
 animation: gantryRotate 7s ease-in-out infinite;
 }
 .beam {
 opacity: 0.18;
 animation: beamPulse 2.2s ease-in-out infinite;
 }
 .joint-glow {
 animation: jointGlow 2.2s ease-in-out infinite;
 }
 .spark-dot {
 animation: sparkMove 2.2s ease-in-out infinite;
 }
 .label-pill {
 background: var(--white);
 border: 1px solid var(--mid-teal);
 color: var(--dark-teal);
 border-radius: 999px;
 padding: 5px 10px;
 font-size: 12px;
 font-weight: 600;
 box-shadow: 0 2px 8px rgba(14,74,87,0.08);
 }
 .linac-labels {
 display: flex;
 flex-wrap: wrap;
 gap: 8px;
 padding: 14px 16px 18px;
 border-top: 1px solid var(--mid-teal);
 background: rgba(255,255,255,0.72);
 }
 @keyframes gantryRotate {
 0%, 100% { transform: rotate(-13deg); }
 50% { transform: rotate(13deg); }
 }
 @keyframes beamPulse {
 0%, 100% { opacity: 0.10; }
 50% { opacity: 0.38; }
 }
 @keyframes jointGlow {
 0%, 100% { opacity: 0.30; transform: scale(1); transform-origin: center; }
 50% { opacity: 0.75; transform: scale(1.08); transform-origin: center; }
 }
 @keyframes sparkMove {
 0% { opacity: 0; transform: translate(-18px, -8px); }
 35% { opacity: 0.75; }
 100% { opacity: 0; transform: translate(34px, 16px); }
 }
 .dose-chart {
 margin-top: 22px;
 display: grid;
 gap: 13px;
 }
 .dose-row {
 display: grid;
 grid-template-columns: 178px 1fr 86px;
 gap: 14px;
 align-items: center;
 }
 .dose-name {
 font-size: 13px;
 font-weight: 600;
 color: var(--gray-1);
 }
 .dose-track {
 height: 20px;
 background: var(--lt-teal);
 border-radius: 999px;
 overflow: hidden;
 border: 1px solid var(--mid-teal);
 }
 .dose-bar {
 height: 100%;
 background: linear-gradient(90deg, var(--teal), var(--dark-teal));
 border-radius: 999px;
 }
 .dose-value {
 font-size: 12px;
 color: var(--gray-2);
 font-weight: 600;
 text-align: right;
 }
 .dose-takeaway {
 margin-top: 22px;
 background: var(--lt-teal);
 border: 1px solid var(--mid-teal);
 border-radius: 10px;
 padding: 16px 18px;
 font-size: 14px;
 color: var(--gray-1);
 line-height: 1.65;
 }
 .dose-footnote {
 margin-top: 12px;
 font-size: 12px;
 color: var(--gray-3);
 line-height: 1.55;
 }
 @media (max-width: 720px) {
 .dose-row {
 grid-template-columns: 1fr;
 gap: 6px;
 }
 .dose-value {
 text-align: left;
 }
 .linac-stage {
 min-height: 280px;
 }
 .linac-svg {
 height: 280px;
 }
 }
/* ── HOSPITAL TABLE ── */
 .hospital-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
 .hospital-table th { background: var(--dark-teal); color: var(--white); padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
 .hospital-table th:first-child { border-radius: 8px 0 0 0; }
 .hospital-table th:last-child { border-radius: 0 8px 0 0; }
 .hospital-table td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid var(--lt-teal); color: var(--gray-1); vertical-align: top; }
 .hospital-table tr:hover td { background: var(--off-white); }
 .badge { display: inline-block; background: var(--lt-teal); color: var(--teal); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }

 /* ── ABOUT PAGE ── */
 .mission-banner { background: linear-gradient(135deg, var(--deep), var(--dark-teal)); border-radius: var(--radius); padding: 44px 48px; color: var(--white); margin-bottom: 48px; }
 .mission-banner h2 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 14px; }
 .mission-banner p { font-size: 16px; color: rgba(255,255,255,0.82); line-height: 1.7; }

 /* ── CONTACT ── */
 .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
 @media (max-width: 680px) { .contact-grid { grid-template-columns: 1fr; } }
 .contact-card { background: var(--lt-teal); border-radius: var(--radius); padding: 28px 26px; }
 .contact-card h3 { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--dark-teal); margin-bottom: 10px; }
 .contact-card p { font-size: 14px; color: var(--gray-2); line-height: 1.65; }
 .contact-card a { color: var(--teal); font-weight: 500; text-decoration: none; }
 .contact-card a:hover { text-decoration: underline; }

 /* ── FOOTER ── */
 footer { background: var(--deep); color: rgba(255,255,255,0.6); text-align: center; padding: 32px 40px; font-size: 13px; margin-top: 60px; }
 footer strong { color: rgba(255,255,255,0.9); font-family: 'Playfair Display', serif; }
 footer p { margin-top: 8px; }

 /* ── BG ALT ── */
 .bg-alt { background: var(--off-white); }
 .full-bg { background: var(--off-white); padding: 64px 0; }
 .full-bg .section { padding-top: 0; padding-bottom: 0; }

 /* ── PAGE HERO (inner pages) ── */
 .page-hero { background: linear-gradient(135deg, var(--deep), var(--dark-teal)); padding: 52px 40px 48px; text-align: center; }
 .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(24px, 3.5vw, 38px); color: var(--white); margin-bottom: 12px; }
 .page-hero p { font-size: 16px; color: rgba(255,255,255,0.75); max-width: 520px; margin: 0 auto; }

 @media (max-width: 600px) {
 nav { padding: 0 16px; }
 .nav-links a { padding: 6px 8px; font-size: 13px; }
 .hero { padding: 60px 20px 50px; }
 .section, .section-sm { padding: 44px 20px; }
 .stat-strip-inner { grid-template-columns: 1fr; padding: 24px 20px; }
 .mission-banner { padding: 28px 24px; }
 .q-box { padding: 24px 20px; }
 }

  /* ── MOBILE NAV FIX ── */
  @media (max-width: 760px) {
    nav {
      height: auto;
      min-height: 0;
      padding: 10px 12px 12px;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }

    .nav-logo {
      width: 100%;
      justify-content: center;
      gap: 8px;
    }

    .nav-logo span {
      white-space: nowrap;
      font-size: 16px;
      line-height: 1.2;
    }

    .nav-logo img {
      width: 28px;
      height: auto;
      flex-shrink: 0;
    }

    .nav-links {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      padding-bottom: 2px;
    }

    .nav-links a {
      flex-shrink: 0;
      white-space: nowrap;
      padding: 7px 12px;
      font-size: 13px;
    }

    .nav-links a.nav-cta {
      margin-left: 2px;
    }

    .nav-dropdown-menu {
      left: 50%;
      transform: translateX(-50%);
    }

    .hero {
      padding-top: 56px;
    }
  }

  @media (max-width: 420px) {
    .nav-links a {
      font-size: 12.5px;
      padding: 6px 10px;
    }
  }

  /* ── PROFESSIONAL TREATMENT ANIMATION ── */
  .treatment-animation-card {
    background: var(--white);
    border: 1px solid var(--mid-teal);
    border-radius: var(--radius);
    padding: 26px;
    box-shadow: var(--shadow);
  }
  .treatment-animation-card h3 {
